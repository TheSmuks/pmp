name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pike build
        id: cache-pike
        uses: actions/cache@v4
        with:
          path: /usr/local/pike/8.0.1116
          key: pike-8.0.1116-v1

      - name: Install build dependencies
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential libgmp-dev libnettle-dev libgnutls-dev libsqlite3-dev zlib1g-dev

      - name: Build and install Pike 8.0
        if: steps.cache-pike.outputs.cache-hit != 'true'
        run: |
          PIKE_VERSION="8.0.1116"
          PIKE_URL="https://pike.lysator.liu.se/pub/pike/all/${PIKE_VERSION}/Pike-v${PIKE_VERSION}.tar.gz"
          cd /tmp
          curl -sL "$PIKE_URL" -o pike.tar.gz
          tar -xzf pike.tar.gz
          cd "Pike-v${PIKE_VERSION}"
          make CONFIGUREARGS="--prefix=/usr/local/pike/${PIKE_VERSION} --without-GTK --without-Gnome --without-Mysql --without-ODBC --without-PDF --without-PG --without-SANE --without-SDL --without-TTF --without-X --without-modules/_Image_SVG" -j$(nproc)
          sudo make install

      - name: Add Pike to PATH
        run: echo "/usr/local/pike/8.0.1116/bin" >> "$GITHUB_PATH"

      - name: Verify Pike
        run: pike --version

      - name: Run tests
        run: sh tests/test_install.sh
