name: Commit Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: commit-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: |
            extends: ['@commitlint/config-conventional']
