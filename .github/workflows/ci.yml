name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pike 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y pike8.0

      - name: Verify Pike
        run: pike --version

      - name: Run shell tests
        run: sh tests/test_install.sh

      - name: Install Pike modules (PUnit)
        run: sh bin/pmp install

      - name: Run Pike unit tests
        run: |
          set -x
          mkdir -p tests/reports
          pike -M modules -M bin tests/pike/run.pike --junit tests/reports/pike-junit.xml
          _exit=$?
          echo "PIKE TESTS EXIT: $_exit"
          exit $_exit
