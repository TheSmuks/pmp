name: Dependency Update

on:
  workflow_call:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pike 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y pike8.0

      - name: Install pmp
        run: |
          set -e
          TMPDIR=$(mktemp -d)
          curl -LsSf https://raw.githubusercontent.com/TheSmuks/pmp/main/install.sh | PMP_INSTALL_DIR="$TMPDIR/pmp" sh
          echo "$TMPDIR/pmp/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pmp install

      - name: Check for outdated dependencies
        id: check
        run: |
          OUTDATED=$(pmp outdated --json 2>&1) || true
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTDATED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if echo "$OUTDATED" | grep -q '\['; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependencies
        if: steps.check.outputs.has_updates == 'true'
        run: pmp update

      - name: Create PR
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: pmp-update-deps
          title: 'chore(deps): update Pike dependencies'
          body: |
            ## Dependency Updates

            ```
            ${{ steps.check.outputs.output }}
            ```

            _Auto-generated by [pmp dep-update workflow](https://github.com/TheSmuks/pmp)_
          commit-message: 'chore(deps): update Pike dependencies via pmp'
          labels: dependencies
          delete-branch: true
