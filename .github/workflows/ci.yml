name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pike 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y pike8.0

      - name: Verify Pike
        run: pike --version

      - name: Run shell tests
        run: sh tests/test_install.sh

      - name: Run Pike unit tests
        run: sh tests/pike_tests.sh
